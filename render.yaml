services:
  - type: web
    name: jumystap-web
    runtime: go
    plan: free
    autoDeployTrigger: commit
    buildCommand: go build -tags netgo -ldflags '-s -w' -o app ./cmd/server
    startCommand: ./app
    healthCheckPath: /healthz
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: jumystap-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: PORT
        value: "10000"
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: ML_URL
        value: ""

databases:
  - name: jumystap-db
    plan: free
    databaseName: jumystap
    user: jumystap

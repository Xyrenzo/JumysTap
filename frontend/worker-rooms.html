<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>JumysTap — Комнаты заданий</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="worker-rooms.css" />
  </head>
  <body>
    <div class="bg-orb bg-orb--1" aria-hidden="true"></div>
    <div class="bg-orb bg-orb--2" aria-hidden="true"></div>
    <div class="bg-grid" aria-hidden="true"></div>

    <header class="top-bar">
      <div class="top-bar__inner">
        <button class="icon-btn" type="button" id="btn-back" title="Назад" aria-label="Назад">
          <svg viewBox="0 0 18 18" fill="none" aria-hidden="true">
            <path d="M10.8 3.5L5.2 9l5.6 5.5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
          </svg>
        </button>

        <div class="brand" aria-label="JumysTap">
          <svg class="brand__mark" viewBox="0 0 56 56" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
            <rect width="56" height="56" rx="16" fill="url(#jt_lg1)" />
            <defs>
              <linearGradient id="jt_lg1" x1="0" y1="0" x2="56" y2="56" gradientUnits="userSpaceOnUse">
                <stop offset="0%" stop-color="#3b82f6" />
                <stop offset="55%" stop-color="#0ea5e9" />
                <stop offset="100%" stop-color="#22d3ee" />
              </linearGradient>
              <linearGradient id="jt_lg2" x1="0" y1="0" x2="56" y2="56" gradientUnits="userSpaceOnUse">
                <stop offset="0%" stop-color="#e0f2fe" />
                <stop offset="100%" stop-color="#ffffff" />
              </linearGradient>
            </defs>
            <text x="6" y="41" font-family="Syne, sans-serif" font-weight="800" font-size="28" fill="url(#jt_lg2)">J</text>
            <text x="26" y="41" font-family="Syne, sans-serif" font-weight="800" font-size="28" fill="url(#jt_lg2)">T</text>
            <circle cx="46.5" cy="12" r="3.6" fill="rgba(255,255,255,.34)" />
          </svg>
          <div class="brand__text">
            <div class="brand__title">Комнаты заданий</div>
            <div class="brand__sub">Для работников • сортировка и фильтры</div>
          </div>
        </div>

        <div class="top-bar__right">
          <div class="pill" id="count-pill">0 комнат</div>
          <button class="btn btn--sm btn--primary" type="button" id="btn-refresh">
            <svg viewBox="0 0 18 18" fill="none" aria-hidden="true">
              <path
                d="M15 8a6 6 0 10-1.2 3.6"
                stroke="currentColor"
                stroke-width="1.8"
                stroke-linecap="round"
                stroke-linejoin="round"
              />
              <path d="M15 3v5h-5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" />
            </svg>
            Обновить
          </button>

          <div class="user">
            <button class="icon-btn" type="button" id="btn-settings" title="Настройки" aria-label="Настройки">
              <svg viewBox="0 0 20 20" fill="none" aria-hidden="true">
                <path
                  d="M10 12.2a2.2 2.2 0 110-4.4 2.2 2.2 0 010 4.4z"
                  stroke="currentColor"
                  stroke-width="1.6"
                />
                <path
                  d="M16.8 10a6.8 6.8 0 00-.1-1l1.5-1.2-1.6-2.8-1.8.6a7.4 7.4 0 00-1.7-1l-.3-1.9H8.2L7.9 4.6a7.4 7.4 0 00-1.7 1l-1.8-.6-1.6 2.8L4.3 9a7.5 7.5 0 000 2l-1.5 1.2 1.6 2.8 1.8-.6a7.4 7.4 0 001.7 1l.3 1.9h3.6l.3-1.9a7.4 7.4 0 001.7-1l1.8.6 1.6-2.8-1.5-1.2c.1-.3.1-.6.1-1z"
                  stroke="currentColor"
                  stroke-width="1.2"
                  stroke-linejoin="round"
                />
              </svg>
            </button>

            <button class="avatar-btn" type="button" id="btn-profile" aria-label="Профиль">
              <span class="avatar-btn__ring" aria-hidden="true"></span>
              <span class="avatar-btn__fallback" id="me-fallback">ME</span>
              <img class="avatar-btn__img hidden" id="me-avatar" alt="Аватар" />
            </button>

            <div class="menu hidden" id="profile-menu" role="menu" aria-label="Меню профиля">
              <button class="menu__item" type="button" id="menu-profile" role="menuitem">Профиль</button>
            </div>
          </div>
        </div>
      </div>
    </header>

    <main class="page">
      <div class="page-head">
        <h1 class="page-title">Найдите комнату и заходите</h1>
        <p class="page-sub">
          Работодатели создают задания — для вас это комнаты (как в играх): короткое описание, навыки и заметная оплата.
        </p>
      </div>

      <section class="filters card">
        <div class="filters__row">
          <div class="search">
            <svg class="search__icon" viewBox="0 0 20 20" fill="none" aria-hidden="true">
              <circle cx="9" cy="9" r="6" stroke="currentColor" stroke-width="1.6" />
              <path d="M13.5 13.5L18 18" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" />
            </svg>
            <input class="search__input" id="q" type="text" placeholder="Поиск: работодатель, профессия/задача, город, навыки…" />
          </div>

          <div class="select">
            <label class="select__label" for="sort">Сортировка</label>
            <select class="select__control" id="sort">
              <option value="new">По новизне</option>
              <option value="pay_desc">По оплате (↓)</option>
              <option value="pay_asc">По оплате (↑)</option>
              <option value="az">По алфавиту (A→Я)</option>
            </select>
          </div>

          <div class="select">
            <label class="select__label" for="type">Тип</label>
            <select class="select__control" id="type">
              <option value="all">Все</option>
              <option value="vacancy">Вакансия</option>
              <option value="freelance">Фриланс</option>
            </select>
          </div>

          <div class="select">
            <label class="select__label" for="loc">Локация</label>
            <select class="select__control" id="loc">
              <option value="all">Все города</option>
            </select>
          </div>

          <label class="check">
            <input type="checkbox" id="urgentOnly" />
            <span class="check__ui" aria-hidden="true"></span>
            только срочные
          </label>

          <button class="btn btn--outline" type="button" id="btn-reset">Сбросить</button>
        </div>
      </section>

      <section class="list">
        <div class="list__grid" id="rooms"></div>
        <div class="empty hidden" id="empty">
          <div class="empty__title">Ничего не найдено</div>
          <div class="empty__sub">Попробуйте снять фильтры или изменить запрос.</div>
        </div>
      </section>

      <div class="toast toast--success hidden" id="toast" role="status" aria-live="polite">
        <svg viewBox="0 0 20 20" fill="none" aria-hidden="true">
          <circle cx="10" cy="10" r="8" fill="#22c55e" opacity=".15" />
          <path d="M6 10l3 3 5-6" stroke="#16a34a" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
        </svg>
        <span id="toast-text">Открываем комнату…</span>
      </div>

      <div class="modal hidden" id="settings-modal" role="dialog" aria-modal="true" aria-labelledby="settings-title">
        <div class="modal__backdrop" data-close="true" aria-hidden="true"></div>
        <div class="modal__panel" role="document">
          <div class="modal__head">
            <div class="modal__title" id="settings-title">Настройки</div>
            <button class="icon-btn" type="button" data-close="true" aria-label="Закрыть">
              <svg viewBox="0 0 18 18" fill="none" aria-hidden="true">
                <path d="M4 4l10 10M14 4L4 14" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
              </svg>
            </button>
          </div>

          <div class="modal__body">
            <label class="pref">
              <input type="checkbox" id="pref-compact" />
              <span class="pref__ui" aria-hidden="true"></span>
              <span class="pref__text">
                <span class="pref__name">Компактный вид</span>
                <span class="pref__desc">Больше комнат на экране</span>
              </span>
            </label>

            <label class="pref">
              <input type="checkbox" id="pref-anim" checked />
              <span class="pref__ui" aria-hidden="true"></span>
              <span class="pref__text">
                <span class="pref__name">Анимации</span>
                <span class="pref__desc">Плавные hover и transitions</span>
              </span>
            </label>

            <label class="pref">
              <input type="checkbox" id="pref-default-urgent" />
              <span class="pref__ui" aria-hidden="true"></span>
              <span class="pref__text">
                <span class="pref__name">Только срочные по умолчанию</span>
                <span class="pref__desc">Фильтр “только срочные” будет включён при входе</span>
              </span>
            </label>

            <label class="pref">
              <input type="checkbox" id="pref-default-pay" />
              <span class="pref__ui" aria-hidden="true"></span>
              <span class="pref__text">
                <span class="pref__name">Сортировать по оплате</span>
                <span class="pref__desc">По умолчанию сортировка “по оплате (↓)”</span>
              </span>
            </label>

            <label class="pref">
              <input type="checkbox" id="pref-open-card" />
              <span class="pref__ui" aria-hidden="true"></span>
              <span class="pref__text">
                <span class="pref__name">Открывать по клику на карточку</span>
                <span class="pref__desc">Вход в комнату по одному клику (не только кнопкой)</span>
              </span>
            </label>
          </div>

          <div class="modal__actions">
            <button class="btn btn--outline" type="button" data-close="true">Готово</button>
          </div>
        </div>
      </div>
    </main>

    <script src="app-api.js"></script>
    <script src="worker-rooms.js"></script>
  </body>
</html>

<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>JumysTap — История моих заданий</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="my-jobs.css" />
  </head>
  <body>
    <div class="bg-orb bg-orb--1" aria-hidden="true"></div>
    <div class="bg-orb bg-orb--2" aria-hidden="true"></div>
    <div class="bg-grid" aria-hidden="true"></div>

    <header class="top-bar">
      <div class="top-bar__inner">
        <button class="icon-btn" type="button" id="btn-back" title="Назад" aria-label="Назад">
          <svg viewBox="0 0 18 18" fill="none" aria-hidden="true">
            <path d="M10.8 3.5L5.2 9l5.6 5.5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
          </svg>
        </button>

        <div class="brand" aria-label="JumysTap">
          <svg class="brand__mark" viewBox="0 0 56 56" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
            <rect width="56" height="56" rx="16" fill="url(#jt_lg1)" />
            <defs>
              <linearGradient id="jt_lg1" x1="0" y1="0" x2="56" y2="56" gradientUnits="userSpaceOnUse">
                <stop offset="0%" stop-color="#3b82f6" />
                <stop offset="55%" stop-color="#0ea5e9" />
                <stop offset="100%" stop-color="#22d3ee" />
              </linearGradient>
              <linearGradient id="jt_lg2" x1="0" y1="0" x2="56" y2="56" gradientUnits="userSpaceOnUse">
                <stop offset="0%" stop-color="#e0f2fe" />
                <stop offset="100%" stop-color="#ffffff" />
              </linearGradient>
            </defs>
            <text x="6" y="41" font-family="Syne, sans-serif" font-weight="800" font-size="28" fill="url(#jt_lg2)">J</text>
            <text x="26" y="41" font-family="Syne, sans-serif" font-weight="800" font-size="28" fill="url(#jt_lg2)">T</text>
            <circle cx="46.5" cy="12" r="3.6" fill="rgba(255,255,255,.34)" />
          </svg>
          <div class="brand__text">
            <div class="brand__title">История моих заданий</div>
            <div class="brand__sub">Архив ваших постов • employer</div>
          </div>
        </div>

        <div class="top-bar__right">
          <div class="pill" id="count-pill">0</div>
          <a class="btn btn--sm btn--primary" href="create-job.html">
            <svg viewBox="0 0 18 18" fill="none" aria-hidden="true">
              <path d="M9 3v12M3 9h12" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
            </svg>
            Создать ещё
          </a>
        </div>
      </div>
    </header>

    <main class="page">
      <div class="page-head">
        <h1 class="page-title">Архив заданий</h1>
        <p class="page-sub">Здесь хранится история созданных вами вакансий и фриланс‑задач (пока локально, без backend).</p>
      </div>

      <section class="controls card">
        <div class="controls__row">
          <div class="search">
            <svg class="search__icon" viewBox="0 0 20 20" fill="none" aria-hidden="true">
              <circle cx="9" cy="9" r="6" stroke="currentColor" stroke-width="1.6" />
              <path d="M13.5 13.5L18 18" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" />
            </svg>
            <input class="search__input" id="q" type="text" placeholder="Поиск по названию/описанию/городу…" />
          </div>

          <div class="select">
            <label class="select__label" for="type">Тип</label>
            <select class="select__control" id="type">
              <option value="all">Все</option>
              <option value="vacancy">Вакансии</option>
              <option value="freelance">Фриланс</option>
            </select>
          </div>

          <div class="select">
            <label class="select__label" for="sort">Сортировка</label>
            <select class="select__control" id="sort">
              <option value="new">Сначала новые</option>
              <option value="old">Сначала старые</option>
              <option value="pay_desc">По оплате (↓)</option>
              <option value="az">По алфавиту</option>
            </select>
          </div>

          <button class="btn btn--outline" type="button" id="btn-clear">Очистить архив</button>
        </div>
      </section>

      <section class="list">
        <div class="list__grid" id="jobs"></div>
        <div class="empty hidden" id="empty">
          <div class="empty__title">Пока пусто</div>
          <div class="empty__sub">Создайте первое задание — оно появится здесь.</div>
          <div style="margin-top: 12px">
            <a class="btn btn--primary" href="create-job.html">Создать задание</a>
          </div>
        </div>
      </section>

      <div class="toast hidden" id="toast" role="status" aria-live="polite">
        <svg viewBox="0 0 20 20" fill="none" aria-hidden="true">
          <circle cx="10" cy="10" r="8" fill="#22c55e" opacity=".15" />
          <path d="M6 10l3 3 5-6" stroke="#16a34a" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
        </svg>
        <span id="toast-text">Готово</span>
      </div>
    </main>

    <script src="app-api.js"></script>
    <script src="my-jobs.js"></script>
  </body>
</html>
